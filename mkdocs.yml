site_name: jaetill-portal
site_url: https://jaetill.github.io/jaetill-portal/
repo_url: https://github.com/jaetill/jaetill-portal
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
  - ADRs:
    - Index: adr/index.md
    - "ADR-0001 Platform adoption": adr/0001-platform-adoption.md
  - Runbooks:
    - Index: runbooks/index.md
    - Deploy: runbooks/deploy.md