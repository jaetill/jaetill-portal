name: release
# Thin caller (ADR-0018) - the release flow lives in the platform reusable:
# jaetill/agentic-dev-environment/.github/workflows/release.yml
# Do NOT inline release-please here; edit the reusable instead.
# The reusable mints a fleet App token (FLEET_APP_ID / FLEET_APP_PRIVATE_KEY
# repo secrets) so the release PR triggers its review checks; absent secrets
# it falls back to GITHUB_TOKEN (PR created but check-less).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # Pin to SHA so contents:write never goes to an unreviewed @main commit.
    # Update SHA after reviewing the platform changelog.
    uses: jaetill/agentic-dev-environment/.github/workflows/release.yml@20305ab7d1515b6c42c562863d21d61624341354
    with:
      release-type: node
    secrets: inherit
