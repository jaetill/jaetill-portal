name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    environment: production   # ADR-0043: prod deploys wait for maintainer approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jaetill/agentic-dev-environment/actions/install-node-deps@main
      - run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_DEPLOY_ENV: production
          VITE_RELEASE_VERSION: ${{ github.sha }}

      # Sentry release + source map upload, gated on SENTRY_AUTH_TOKEN being
      # present. Phase 5 of platform adoption will wire Sentry; this step
      # skips cleanly until then per ADR-0001.
      - name: Upload source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        uses: getsentry/action-release@v1
        with:
          version: ${{ github.sha }}
          environment: prod
          sourcemaps: ./dist
          set_commits: auto
          finalize: true
      - name: Strip source maps from dist/ before S3 sync
        if: always()
        run: |
          find dist -name '*.map' -type f -delete
          find dist -name '*.js' -type f -exec sed -i '/\/\/# sourceMappingURL=/d' {} +
          find dist -name '*.css' -type f -exec sed -i '/\/\*# sourceMappingURL=/d' {} +

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Sync HTML to S3 (no-cache)
        run: |
          aws s3 sync dist/ s3://jaetill-portal/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
      - name: Sync assets to S3 (immutable)
        run: |
          aws s3 sync dist/assets/ s3://jaetill-portal/assets/ \
            --cache-control "max-age=31536000, immutable"
      - name: Invalidate CloudFront HTML
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3L96MPPOA7GTI \
            --paths "/index.html" "/callback.html"
