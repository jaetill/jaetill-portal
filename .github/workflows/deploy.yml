name: Deploy to S3 + CloudFront

on:
  push:
    branches: [master]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Sync HTML to S3 (no-cache)
        run: |
          aws s3 sync dist/ s3://jaetill-portal/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
      - name: Sync assets to S3 (immutable)
        run: |
          aws s3 sync dist/assets/ s3://jaetill-portal/assets/ \
            --cache-control "max-age=31536000, immutable"
      - name: Invalidate CloudFront HTML
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3L96MPPOA7GTI \
            --paths "/index.html" "/callback.html"
