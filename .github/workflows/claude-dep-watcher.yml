name: claude-dep-watcher
# Thin caller (ADR-0018 / ADR-0045) - dep-watch lives in the platform reusable:
# jaetill/agentic-dev-environment/.github/workflows/dep-watch.yml
# The reusable runs the LLM agent read-only and publishes the rolling report
# via a separate deterministic job (writer != publisher).

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write # ceiling for publish job (commits to reports/dep-watch); generate job uses read only
  id-token: write # OIDC for claude-code-action in generate job

jobs:
  dep-watch:
    # Pin to SHA so contents:write never goes to an unreviewed @main commit.
    # Update SHA after reviewing the platform changelog.
    uses: jaetill/agentic-dev-environment/.github/workflows/dep-watch.yml@9d5194669c5ff54af99e180b93f337d759ec6f5d
    secrets: inherit
